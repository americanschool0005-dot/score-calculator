<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Results — Grade Calculator</title>
<style>
  :root{
    --bg:#FFFFFF;
    --surface:#F7F8FA;
    --border:#E3E5E8;
    --ink:#1A1D21;
    --ink-soft:#6B7280;
    --accent:#2563EB;
    --pending:#DC2626;
    --pending-bg:#FEF2F2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    padding:40px 20px 60px;
  }
  .wrap{max-width:900px;margin:0 auto;}

  header{
    margin-bottom:28px;
  }
  header .eyebrow{
    font-size:12px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--ink-soft);
    font-weight:600;
  }
  header h1{
    margin:6px 0 0;
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.02em;
  }

  .actions{
    display:flex;
    gap:10px;
    margin-bottom:28px;
    flex-wrap:wrap;
  }
  button{
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    padding:9px 16px;
    border-radius:6px;
    cursor:pointer;
    border:1px solid var(--border);
    background:var(--bg);
    color:var(--ink);
  }
  button:hover{background:var(--surface);}
  button.primary{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  button.primary:hover{background:#1D4ED8;}
  #addBtn{
    color:var(--ink-soft);
    border-style:dashed;
  }

  section.panel{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    padding:20px;
    margin-bottom:20px;
  }
  section.panel h2{
    margin:0 0 14px;
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--ink-soft);
  }

  table.settings-table{
    width:100%;
    border-collapse:collapse;
  }
  table.settings-table th{
    text-align:left;
    font-size:12px;
    font-weight:600;
    color:var(--ink-soft);
    padding:0 10px 8px 0;
  }
  table.settings-table th.num{text-align:center;}
  table.settings-table td{
    padding:6px 10px 6px 0;
    font-size:14px;
  }
  table.settings-table td.num{text-align:center;}

  input.config-input{
    width:60px;
    text-align:center;
    font-family:inherit;
    font-size:13px;
    padding:6px 4px;
    border:1px solid var(--border);
    border-radius:5px;
    background:#fff;
    color:var(--ink);
  }
  input.config-input:focus{
    outline:none;
    border-color:var(--accent);
  }

  .weight-warning, .note{
    background:var(--pending-bg);
    border:1px solid #FBD5D5;
    color:var(--ink);
    font-size:13px;
    padding:10px 14px;
    border-radius:6px;
    margin-bottom:20px;
    line-height:1.5;
  }

  table.results-table{
    width:100%;
    border-collapse:collapse;
    background:var(--bg);
  }
  table.results-table thead th{
    text-align:left;
    font-size:12px;
    font-weight:600;
    color:var(--ink-soft);
    padding:10px 10px;
    border-bottom:1px solid var(--border);
  }
  table.results-table thead th.num{text-align:center;}
  table.results-table tbody td{
    padding:10px;
    border-bottom:1px solid var(--border);
    vertical-align:middle;
    font-size:14px;
  }
  table.results-table tbody tr:hover{background:var(--surface);}
  td.name{font-weight:600;}
  td.num{text-align:center;color:var(--ink-soft);}

  input.name-input{
    width:100%;
    font-family:inherit;
    font-weight:600;
    font-size:14px;
    color:var(--ink);
    padding:6px 8px;
    border:1px solid transparent;
    border-radius:5px;
    background:transparent;
  }
  input.name-input:hover{border-color:var(--border);background:#fff;}
  input.name-input:focus{outline:none;border-color:var(--accent);background:#fff;}

  input.score-input{
    width:56px;
    text-align:center;
    font-family:inherit;
    font-size:13px;
    padding:6px 4px;
    border:1px solid var(--border);
    border-radius:5px;
    background:#fff;
    color:var(--ink);
  }
  input.score-input:focus{outline:none;border-color:var(--accent);}

  input.speaking-input{
    width:64px;
    text-align:center;
    font-family:inherit;
    font-size:13px;
    padding:6px 4px;
    border:1px solid var(--border);
    border-radius:5px;
    background:#fff;
    color:var(--ink);
  }
  input.speaking-input:focus{outline:none;border-color:var(--accent);}
  input.speaking-input.empty{
    border-color:var(--pending);
    background:var(--pending-bg);
  }

  .contrib{font-size:12px;color:var(--ink-soft);}
  .contrib .pending{color:var(--pending);font-style:italic;}

  td.total{
    font-weight:700;
    font-size:15px;
    color:var(--accent);
    text-align:center;
    min-width:110px;
  }
  td.total .max{
    font-weight:400;
    font-size:11px;
    color:var(--ink-soft);
  }
  td.total .partial-tag{
    display:block;
    font-weight:400;
    font-size:10px;
    color:var(--pending);
    margin-top:2px;
  }

  .bar-track{
    width:100%;
    height:4px;
    background:var(--border);
    border-radius:3px;
    margin-top:6px;
    overflow:hidden;
  }
  .bar-fill{height:100%;background:var(--accent);}

  .del-btn{
    background:transparent;
    border:none;
    color:var(--ink-soft);
    font-size:16px;
    cursor:pointer;
    line-height:1;
    padding:4px;
  }
  .del-btn:hover{color:var(--pending);}

  footer{
    margin-top:24px;
    font-size:12px;
    color:var(--ink-soft);
    line-height:1.6;
  }

  .empty-state{
    text-align:center;
    padding:32px 10px;
    color:var(--ink-soft);
    font-size:14px;
  }

  /* Print styles for PDF export */
  @media print{
    body{padding:0;background:#fff;}
    .actions, #addBtn, .del-btn, section.panel{display:none;}
    header{border-bottom:2px solid #000;padding-bottom:10px;}
    table.results-table thead th{border-bottom:2px solid #000;}
    input{
      border:none !important;
      background:transparent !important;
      padding:2px !important;
      color:#000 !important;
    }
    .bar-track{display:none;}
    td.total{color:#000;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Class Gradebook · Grammar &amp; Reading / Writing / Speaking</div>
    <h1>Exam Results Calculator</h1>
  </header>

  <div class="actions">
    <button id="addBtn">+ Add student</button>
    <button id="downloadBtn" class="primary">Download PDF</button>
  </div>

  <section class="panel">
    <h2>Scoring settings</h2>
    <table class="settings-table">
      <thead>
        <tr>
          <th>Component</th>
          <th class="num" style="width:140px">Max raw score</th>
          <th class="num" style="width:140px">Weight of total</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Grammar + Reading</td>
          <td class="num"><input type="number" min="1" class="config-input" id="cfg-grammarMax" data-cfg="grammarMax"></td>
          <td class="num"><input type="number" min="0" max="100" class="config-input" id="cfg-grammarWeight" data-cfg="grammarWeight">%</td>
        </tr>
        <tr>
          <td>Writing</td>
          <td class="num"><input type="number" min="1" class="config-input" id="cfg-writingMax" data-cfg="writingMax"></td>
          <td class="num"><input type="number" min="0" max="100" class="config-input" id="cfg-writingWeight" data-cfg="writingWeight">%</td>
        </tr>
        <tr>
          <td>Speaking</td>
          <td class="num"><input type="number" min="1" class="config-input" id="cfg-speakingMax" data-cfg="speakingMax"></td>
          <td class="num"><input type="number" min="0" max="100" class="config-input" id="cfg-speakingWeight" data-cfg="speakingWeight">%</td>
        </tr>
      </tbody>
    </table>
  </section>

  <div id="weightWarning" class="weight-warning" style="display:none;"></div>

  <table class="results-table">
    <thead>
      <tr>
        <th>Student</th>
        <th class="num">Gram+Read<br><span style="font-weight:400;color:var(--ink-soft)" id="hdr-grammarMax">/70</span></th>
        <th class="num">Writing<br><span style="font-weight:400;color:var(--ink-soft)" id="hdr-writingMax">/100</span></th>
        <th class="num">Speaking<br><span style="font-weight:400;color:var(--ink-soft)" id="hdr-speakingMax">/100</span></th>
        <th class="num" style="width:170px">Contribution</th>
        <th class="num" style="width:110px">Total</th>
        <th class="num" style="width:30px"></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <footer id="formulaFooter">
    All figures rounded to one decimal place.
  </footer>

</div>

<script>
const students = [];

const config = {
  grammarMax: 70,
  writingMax: 100,
  speakingMax: 100,
  grammarWeight: 50,
  writingWeight: 25,
  speakingWeight: 25,
};

const tbody = document.getElementById('rows');

function renderSettings(){
  Object.keys(config).forEach(key => {
    const inp = document.getElementById('cfg-' + key);
    if(inp && document.activeElement !== inp) inp.value = config[key];
  });
  document.getElementById('hdr-grammarMax').textContent = '/' + config.grammarMax;
  document.getElementById('hdr-writingMax').textContent = '/' + config.writingMax;
  document.getElementById('hdr-speakingMax').textContent = '/' + config.speakingMax;

  const weightSum = config.grammarWeight + config.writingWeight + config.speakingWeight;
  const warning = document.getElementById('weightWarning');
  if(weightSum !== 100){
    warning.style.display = 'block';
    warning.textContent = `Weights currently add up to ${weightSum}%, not 100%. Totals below reflect these weights as entered.`;
  } else {
    warning.style.display = 'none';
  }

  document.getElementById('formulaFooter').innerHTML =
    `Formula — Total = (Grammar+Reading ÷ ${config.grammarMax} × ${config.grammarWeight}) + (Writing ÷ ${config.writingMax} × ${config.writingWeight}) + (Speaking ÷ ${config.speakingMax} × ${config.speakingWeight})<br>All figures rounded to one decimal place.`;
}

function render(){
  renderSettings();
  const fullMax = config.grammarWeight + config.writingWeight + config.speakingWeight;
  const partialMax = config.grammarWeight + config.writingWeight;

  tbody.innerHTML = '';

  if(students.length === 0){
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="7" class="empty-state">No students yet — click "+ Add student" to get started.</td>`;
    tbody.appendChild(tr);
    return;
  }

  students.forEach((s, i) => {
    const gPct = (s.grammar / config.grammarMax) * config.grammarWeight;
    const wPct = (s.writing / config.writingMax) * config.writingWeight;
    const hasSpeaking = s.speaking !== undefined && s.speaking !== null && s.speaking !== '';
    const sVal = hasSpeaking ? Number(s.speaking) : null;
    const sPct = hasSpeaking ? (sVal / config.speakingMax) * config.speakingWeight : 0;
    const total = gPct + wPct + sPct;
    const maxSoFar = hasSpeaking ? fullMax : partialMax;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="name">
        <input type="text" class="name-input" value="${s.name}" data-index="${i}" data-field="name">
      </td>
      <td class="num">
        <input type="number" min="0" max="${config.grammarMax}" class="score-input" value="${s.grammar}" data-index="${i}" data-field="grammar">
      </td>
      <td class="num">
        <input type="number" min="0" max="${config.writingMax}" class="score-input" value="${s.writing}" data-index="${i}" data-field="writing">
      </td>
      <td class="num">
        <input type="number" min="0" max="${config.speakingMax}" class="speaking-input ${hasSpeaking ? '' : 'empty'}"
               placeholder="—" value="${hasSpeaking ? sVal : ''}" data-index="${i}" data-field="speaking">
      </td>
      <td class="contrib">
        G+R ${gPct.toFixed(1)} ·
        Wr ${wPct.toFixed(1)} ·
        ${hasSpeaking ? `Sp ${sPct.toFixed(1)}` : `<span class="pending">Sp pending</span>`}
      </td>
      <td class="total">
        ${total.toFixed(1)} <span class="max">/ ${maxSoFar}</span>
        ${!hasSpeaking ? `<span class="partial-tag">partial</span>` : ''}
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min((total/fullMax)*100,100)}%"></div></div>
      </td>
      <td class="num">
        <button class="del-btn" data-index="${i}" title="Remove student">×</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  document.querySelectorAll('input[data-field]').forEach(inp => {
    inp.addEventListener('input', e => {
      const idx = Number(e.target.dataset.index);
      const field = e.target.dataset.field;
      const val = e.target.value;
      const selector = `input[data-field="${field}"][data-index="${idx}"]`;

      if(field === 'name'){
        students[idx].name = val;
      } else if(field === 'speaking'){
        students[idx].speaking = val === '' ? null : Math.max(0, Math.min(config.speakingMax, Number(val)));
      } else if(field === 'grammar'){
        students[idx].grammar = val === '' ? 0 : Math.max(0, Math.min(config.grammarMax, Number(val)));
      } else if(field === 'writing'){
        students[idx].writing = val === '' ? 0 : Math.max(0, Math.min(config.writingMax, Number(val)));
      }

      const caret = e.target.selectionStart;
      render();
      const newInp = document.querySelector(selector);
      if(newInp){ newInp.focus(); if(field === 'name'){ newInp.setSelectionRange(caret, caret); } else { newInp.setSelectionRange(newInp.value.length, newInp.value.length); } }
    });
  });

  document.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = Number(e.target.dataset.index);
      students.splice(idx, 1);
      render();
    });
  });
}

document.querySelectorAll('.config-input').forEach(inp => {
  inp.addEventListener('input', e => {
    const key = e.target.dataset.cfg;
    const val = e.target.value;
    config[key] = val === '' ? 0 : Number(val);
    render();
    const same = document.getElementById('cfg-' + key);
    if(same){ same.focus(); }
  });
});

document.getElementById('addBtn').addEventListener('click', () => {
  students.push({ name: "New student", grammar: 0, writing: 0 });
  render();
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  window.print();
});

render();
</script>
</body>
</html>
